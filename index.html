<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Ghi âm - MTTQ Phường An Khánh</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --mttq-blue: #004a8c;
            --mttq-red: #d42020;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #e9ecef;
            padding: 30px;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            border-top: 6px solid var(--mttq-red);
        }

        .header-unit {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-unit h2 {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .header-unit h1 {
            margin: 5px 0;
            font-size: 22px;
            color: var(--mttq-blue);
            text-transform: uppercase;
        }

        .line-separator {
            width: 150px;
            height: 2px;
            background-color: var(--mttq-blue);
            margin: 10px auto;
        }

        .control-panel {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .btn-start { background-color: var(--mttq-red); color: white; }
        .btn-stop { background-color: #495057; color: white; display: none; }
        .btn-word { background-color: #2b579a; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        #status-indicator {
            text-align: center;
            height: 30px;
            color: var(--mttq-red);
            font-weight: bold;
            font-style: italic;
        }

        #transcript-editor {
            width: 100%;
            min-height: 500px;
            border: 1px solid #adb5bd;
            padding: 25px;
            font-size: 14pt; /* Chuẩn 14pt */
            line-height: 1.6;
            box-sizing: border-box;
            text-align: justify;
            outline: none;
            background: #fff;
        }

        .footer-info {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #6c757d;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-unit">
        <h2>ỦY BAN TRUNG ƯƠNG MTTQ VIỆT NAM</h2>
        <h1>ỦY BAN MẶT TRẬN TỔ QUỐC VIỆT NAM<br>PHƯỜNG AN KHÁNH</h1>
        <div class="line-separator"></div>
        <p style="margin-top: 15px; font-weight: bold;">HỆ THỐNG TRỢ LÝ GHI ÂM CHUYỂN VĂN BẢN</p>
    </div>

    <div id="status-indicator"></div>

    <div class="control-panel">
        <button id="startBtn" class="btn-start" onclick="startRecording()">BẮT ĐẦU GHI</button>
        <button id="stopBtn" class="btn-stop" onclick="stopRecording()">DỪNG LẠI</button>
        <button class="btn-word" onclick="exportWord()">XUẤT BIÊN BẢN (.DOCX)</button>
    </div>

    <div id="transcript-editor" contenteditable="true">
        (Nội dung cuộc họp sẽ tự động hiển thị tại đây khi bạn nói...)
    </div>

    <div class="footer-info">
        Hệ thống hỗ trợ soạn thảo văn bản nội bộ - Phường An Khánh
    </div>
</div>

<script>
    let recognition;
    
    // Kiểm tra tính năng nhận diện giọng nói
    if ('webkitSpeechRecognition' in window || 'speechRecognition' in window) {
        const SpeechRecognition = window.webkitSpeechRecognition || window.speechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'vi-VN';

        recognition.onresult = (event) => {
            let final_text = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    final_text += event.results[i][0].transcript + '. ';
                }
            }
            if (final_text) {
                const editor = document.getElementById('transcript-editor');
                if(editor.innerText.includes("(Nội dung")) editor.innerText = "";
                editor.innerText += final_text.charAt(0).toUpperCase() + final_text.slice(1);
            }
        };

        recognition.onstart = () => {
            document.getElementById('status-indicator').innerText = "● ĐANG GHI ÂM VÀ CHUYỂN NGỮ...";
        };

        recognition.onend = () => {
            document.getElementById('status-indicator').innerText = "";
        };
    } else {
        alert("Lưu ý: Trình duyệt của bạn không hỗ trợ tính năng nhận diện giọng nói. Vui lòng dùng Chrome hoặc Edge.");
    }

    function startRecording() {
        recognition.start();
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
    }

    function stopRecording() {
        recognition.stop();
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
    }

    // Hàm xuất file Word chuẩn 14pt Times New Roman
    async function exportWord() {
        const content = document.getElementById('transcript-editor').innerText;
        const { Document, Packer, Paragraph, TextRun, AlignmentType } = docx;

        const doc = new Document({
            sections: [{
                properties: {},
                children: [
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        children: [
                            new TextRun({
                                text: "ỦY BAN MẶT TRẬN TỔ QUỐC VIỆT NAM PHƯỜNG AN KHÁNH",
                                bold: true,
                                font: "Times New Roman",
                                size: 28, // 14pt
                            }),
                        ],
                    }),
                    new Paragraph({ text: "", spacing: { after: 200 } }), // Dòng trống
                    new Paragraph({
                        children: [
                            new TextRun({
                                text: content,
                                font: "Times New Roman",
                                size: 28, // 14pt
                            }),
                        ],
                    }),
                ],
            }],
        });

        const blob = await Packer.toBlob(doc);
        saveAs(blob, "Bien_ban_hop_An_Khanh.docx");
    }
</script>

</body>
</html>
